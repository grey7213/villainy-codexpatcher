<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Terminal window body -->
  <rect x="2" y="4" width="28" height="24" rx="5" fill="#131922" stroke="#283040" stroke-width="1"/>
  <!-- Title bar divider -->
  <line x1="2.5" y1="11" x2="29.5" y2="11" stroke="#283040" stroke-width="1"/>
  <!-- Title bar dots -->
  <circle cx="6.5" cy="7.5" r="1.15" fill="#3d4657"/>
  <circle cx="10.2" cy="7.5" r="1.15" fill="#3d4657"/>
  <!-- Prompt chevron > -->
  <path d="M8.5 16.5 L12 20 L8.5 23.5" stroke="#3fb950" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor _ -->
  <rect x="14.5" y="22" width="7" height="2.1" rx="1" fill="#3fb950"/>
  <!-- Patch dot (top-right, sits on the frame) -->
  <circle cx="27" cy="6" r="4" fill="#131922"/>
  <circle cx="27" cy="6" r="3.2" fill="#d29922"/>
  <path d="M25.5 6 L26.7 7.2 L28.7 4.9" stroke="#131922" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
